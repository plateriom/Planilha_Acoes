name: Atualizar Planilha de FIIs

on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *' # Todo dia às 22:30 UTC / 19h30 Brasília

permissions:
  contents: read

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar credentials.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Executar script de FIIs
        run: python update_fiis.py
